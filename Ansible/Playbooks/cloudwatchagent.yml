
# download cloudwatch agent package
  - name: Download CloudWatch Agent package
    get_url:
      url: https://s3.amazonaws.com/amazoncloudwatch-agent/amazon_linux/amd64/latest/amazon-cloudwatch-agent.rpm
      dest: /tmp/amazon-cloudwatch-agent.rpm

# install cloudwatch agent package
  - name: Install CloudWatch Agent package
    dnf:
      name: /tmp/amazon-cloudwatch-agent.rpm
      state: present
      disable_gpg_check: yes

# create config directory
  - name: Create CloudWatch Agent config directory
    file:
      path: /opt/aws/amazon-cloudwatch-agent/etc
      state: directory

# copy configuration file
  - name: Copy CloudWatch Agent configuration file
    template:
      src: ../Templates/cloudwatchagent-config.json.tpl
      dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
      owner: root
      group: root
      mode: '0644'

# start cloudwatch agent
  - name: Start CloudWatch Agent
    command: >
      /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl
      -a fetch-config
      -m ec2
      -s
      -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

# enable service to start on boot
  - name: Enable CloudWatch Agent service on boot
    systemd:
      name: amazon-cloudwatch-agent
      enabled: yes
      state: started

# verify agent is running
  - name: Check CloudWatch Agent status
    command: /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a query -m ec2 -c default
    register: agent_status
    changed_when: false

  - name: Display agent status
    debug:
      msg: "CloudWatch Agent status: {{ agent_status.stdout }}"


