name: 'Ansible Deploy'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'AWS-Terraform-dev'
        type: choice
        options:
          - AWS-Terraform-dev
          - AWS-Terraform-prod

permissions:
  contents: read

jobs:
  ansible:
    name: 'Configure ${{ github.event.inputs.environment }}'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment == 'AWS-Terraform-dev' && 'development' || 'production' }}

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v1
      with:
        cli_config_credentials_token: ${{ secrets.ACTIONS_TOKEN_FROM_TF_IO }}
        terraform_wrapper: false

    # Select correct workspace based on environment
    - name: Terraform Init
      env:
        TF_WORKSPACE: ${{ github.event.inputs.environment }}
      run: |
        terraform init
        echo "Using workspace: "${{ github.event.inputs.environment }}""

    - name: Get S3 Bucket Name
      env:
        TF_WORKSPACE: ${{ github.event.inputs.environment }}
      run: |
        echo "Fetching S3 bucket name from Terraform"
        S3_BUCKET=$(terraform output -raw a_s3_bucket_name)
        echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
        echo "Fetched S3 bucket name: $S3_BUCKET"
       # echo "S3 Bucket: $S3_BUCKET"

    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        echo "SSH key configured"

    - name: Install Ansible and required dependencies
      run: |
        pip install ansible boto3 botocore
        ansible-galaxy collection install amazon.aws
        ansible --version
        echo "Ansible and required AWS dependencies installed"

    - name: Debug - Check GitHub Runner IP
      env:
        TF_WORKSPACE: ${{ github.event.inputs.environment }}
        
      run: |
        echo "=== GitHub Actions Runner IP Address ==="
        curl -s ifconfig.me
        echo ""
        echo "^^^ This IP needs SSH access (port 22) in your security group!"
        echo ""
        echo "=== Target EC2 Instances ==="
        echo "Attempting to connect to:"
        terraform output -json a_web_servers_public_ip_url | jq -r '.[]'

    - name: Debug SSH Connection
      env:
          TF_WORKSPACE: ${{ github.event.inputs.environment }}
      run: |
       echo "=== Debugging SSH Connection ==="
    
        # Get first EC2 IP
        EC2_IP=$(terraform output -json a_web_servers_public_ip_url | jq -r '.[0]' | sed 's|http://||' | sed 's|:80||')
        echo "Testing SSH to: $EC2_IP"
        
        # Check SSH key file
        echo ""
        echo "=== SSH Key File Info ==="
        ls -la ~/.ssh/id_rsa
        
        # Show key fingerprint
        echo ""
        echo "=== Private Key Fingerprint ==="
        ssh-keygen -lf ~/.ssh/id_rsa
        
        # Test SSH with verbose output
        echo ""
        echo "=== Testing SSH Connection (verbose) ==="
        ssh -vvv -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10 \
          ec2-user@$EC2_IP echo "SSH SUCCESS!" 2>&1 | tail -50

    - name: Configure Servers
      env:
        AWS_REGION: us-west-2
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      run: |
        cd Ansible
        echo "Running Ansible playbook"
        echo "Environment: ${{ github.event.inputs.environment }}"
        echo "S3 Bucket: ${{ env.S3_BUCKET }}"

        ansible-playbook -i Inventory/aws_ec2.yml Playbooks/site.yml \
          -e "s3_bucket_name=${{ env.S3_BUCKET }}"
