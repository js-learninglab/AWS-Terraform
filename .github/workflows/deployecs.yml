### bnow that we have the dockerfile lets build the image and push it to ECR
name: 'ECS build and Deploy'

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - AWS-Terraform-dev
          - AWS-Terraform-prod

permissions:
  contents: read

jobs:
    build-and-deploy:
      name: 'Build and Deploy to ECS'
      runs-on: ubuntu-latest
      environment: ${{ github.event.inputs.environment == 'AWS-Terraform-dev' && 'development' || 'production' }}
  
      defaults:
        run:
          shell: bash
  
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v2
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
            aws-region: us-west-2
  
        - name: Login to Amazon ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v1
  
        - name: Set environment suffix
          id: env-suffix
          run: |
            if [ "${{ github.event.inputs.environment }}" == "AWS-Terraform-dev" ]; then
              echo "ENV_SUFFIX=dev" >> $GITHUB_ENV
            else
              echo "ENV_SUFFIX=prod" >> $GITHUB_ENV
            fi
  
        - name: Build Docker image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: jslearninglab-ecr-repo
            IMAGE_TAG: ${{ env.ENV_SUFFIX }}
          run: |
            echo "Building image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
            echo "Image built successfully"

        - name: Push Docker image to ECR
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: jslearninglab-ecr-repo
            IMAGE_TAG: ${{ env.ENV_SUFFIX }}
          run: |
            echo "Pushing image to ECR: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
            docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            echo "Image pushed successfully"

        - name: Download current task definition
          env:
            TASK_FAMILY: JSLearningLab-${{ env.ENV_SUFFIX }}-ecs-web-app
          run: |
            echo "Downloading task definition: $TASK_FAMILY"
            aws ecs describe-task-definition \
              --task-definition $TASK_FAMILY \
              --query taskDefinition \
              --region us-west-2 > task-def.json
            echo "Task definition downloaded"

        - name: Update task definition with new image
          env:
            ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
            ECR_REPOSITORY: jslearninglab-ecr-repo
            IMAGE_TAG: ${{ env.ENV_SUFFIX }}
          run: |
            NEW_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
            echo "Updating task definition to use image: $NEW_IMAGE"
        
            cat task-def.json | jq --arg IMAGE "$NEW_IMAGE" '.containerDefinitions[0].image = $IMAGE | 
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' > new-task-def.json
        
            echo "Task definition updated"

        - name: Register new task definition
          run: |
            echo "Registering new task definition revision"
            NEW_TASK_INFO=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --region us-west-2)
        
            NEW_REVISION=$(echo $NEW_TASK_INFO | jq -r '.taskDefinition.revision')
            echo "Created task definition revision: $NEW_REVISION"
            echo "TASK_REVISION=$NEW_REVISION" >> $GITHUB_ENV

        - name: Deploy to ECS
          env:
            CLUSTER_NAME: JSLearningLab-${{ env.ENV_SUFFIX }}-ecs-cluster
            SERVICE_NAME: JSLearningLab-${{ env.ENV_SUFFIX }}-ecs-service
          run: |
            echo "Deploying to ECS:"
            echo "Cluster: $CLUSTER_NAME"
            echo "Service: $SERVICE_NAME"
            echo "Task Definition: $TASK_FAMILY:${{ env.TASK_REVISION }}"
  
            aws ecs update-service --cluster $CLUSTER_NAME --service $SERVICE_NAME --task-definition $TASK_FAMILY:${{ env.TASK_REVISION }} --region us-west-2
  
            echo "ECS service update initiated successfully"
            echo "Waiting for service to stabilize..."
  
            aws ecs wait services-stable --cluster $CLUSTER_NAME --services $SERVICE_NAME --region us-west-2
  
            echo "Deployment complete!"
        